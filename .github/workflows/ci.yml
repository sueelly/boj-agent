name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ============================================================
  # Java / Kotlin (Gradle) — 프로젝트에 맞게 조정
  # ============================================================
  build-and-test-java:
    if: |
      hashFiles('gradlew') != '' ||
      hashFiles('mvnw') != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle  # 또는 maven

      # --- Gradle 빌드 ---
      - name: Grant execute permission for gradlew
        if: hashFiles('gradlew') != ''
        run: chmod +x gradlew

      - name: Build with Gradle
        if: hashFiles('gradlew') != ''
        run: ./gradlew build
        env:
          SPRING_PROFILES_ACTIVE: test

      # --- Maven 빌드 ---
      - name: Build with Maven
        if: hashFiles('mvnw') != ''
        run: ./mvnw verify
        env:
          SPRING_PROFILES_ACTIVE: test

      # --- 테스트 결과 PR 코멘트 ---
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/build/test-results/**/*.xml
            **/target/surefire-reports/**/*.xml

      # --- 아키텍처 테스트: 파일이 있을 때만 실행, 실패 시 job 실패 ---
      - name: Architecture Test (Java/Kotlin)
        run: |
          if [ -f "gradlew" ] && find . -path "*/test/*" -name "*ArchitectureTest*" 2>/dev/null | grep -q .; then
            echo "=== Architecture Test ==="
            ./gradlew test --tests "*ArchitectureTest"
          fi

  # ============================================================
  # Node.js (프론트/풀스택) — package.json 있을 때만 실행
  # ============================================================
  build-and-test-node:
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # build 스크립트가 없는 프로젝트는 package.json에 "build": "echo 'no-op'" 추가 권장

      - name: Run tests
        run: npm test

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/junit.xml
            **/test-results/**/*.xml

  # ============================================================
  # Python — 프로젝트에 맞게 조정
  # ============================================================
  build-and-test-python:
    if: |
      hashFiles('pyproject.toml') != '' ||
      hashFiles('setup.py') != '' ||
      hashFiles('requirements.txt') != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "pyproject.toml" ]; then pip install -e ".[dev]"; fi
          if [ -f "requirements-dev.txt" ]; then pip install -r requirements-dev.txt; fi
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          pytest --tb=short --junitxml=junit.xml -v

      # 아키텍처 테스트 파일이 있을 때만 실행, 실패 시 job 실패
      - name: Architecture Tests (Python)
        run: |
          if [ -f "tests/test_architecture.py" ]; then
            echo "=== Architecture Tests ==="
            pytest tests/test_architecture.py -v
          fi

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: junit.xml

  # ============================================================
  # 보안 스캔 — 모든 프로젝트 공통
  # ============================================================
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          echo "=== 하드코딩된 시크릿 스캔 ==="
          FOUND=false

          # 공통 시크릿 패턴 스캔
          SECRETS=$(grep -rn \
            -E "(password|secret|api_key|apikey|token|passwd)\s*=\s*['\"][^$\{(\s][^'\"]{3,}" \
            --include="*.java" \
            --include="*.kt" \
            --include="*.py" \
            --include="*.ts" \
            --include="*.js" \
            --include="*.yml" \
            --include="*.yaml" \
            --include="*.properties" \
            . 2>/dev/null \
            | grep -v "test\|Test\|example\|placeholder\|TODO\|#\|//" \
            || true)

          if [ -n "$SECRETS" ]; then
            echo "❌ 하드코딩된 시크릿 의심 발견:"
            echo "$SECRETS"
            FOUND=true
          else
            echo "✅ 하드코딩된 시크릿 없음"
          fi

          if [ "$FOUND" = true ]; then
            exit 1
          fi

      - name: Scan for dangerous patterns
        run: |
          echo "=== 위험 패턴 스캔 ==="

          # printStackTrace 스캔 (경고만)
          STACK=$(grep -rn "printStackTrace()" --include="*.java" --include="*.kt" src/ 2>/dev/null || true)
          if [ -n "$STACK" ]; then
            echo "⚠️ WARNING: printStackTrace() 발견 (Logger 사용 권장):"
            echo "$STACK"
          fi

          # Python print() in src (경고만)
          if [ -d "src" ] || [ -d "app" ]; then
            PRINT_DIR="${SRC_DIR:-src}"
            PRINTS=$(grep -rn "^\s*print(" --include="*.py" "$PRINT_DIR/" 2>/dev/null | grep -v "test\|#" || true)
            if [ -n "$PRINTS" ]; then
              echo "⚠️ WARNING: print() 발견 (logger 사용 권장):"
              echo "$PRINTS" | head -10
            fi
          fi

          echo "✅ 위험 패턴 스캔 완료"
