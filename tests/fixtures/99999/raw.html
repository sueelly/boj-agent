<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>99999번: 두 수의 합</title>
</head>
<body>
<div class="col-md-12">
  <h1><span id="problem_title">두 수의 합</span></h1>
</div>
<div class="problem-info">
  <table>
    <tbody>
      <tr>
        <td><span id="problem_time_limit">1 초</span></td>
        <td><span id="problem_memory_limit">256 MB</span></td>
      </tr>
    </tbody>
  </table>
</div>
<div id="problem_description" class="problem-text">
<p>두 정수 A와 B를 입력받은 다음, A+B를 출력하는 프로그램을 작성하시오.</p>
</div>
<div id="problem_input" class="problem-text">
<p>첫째 줄에 A와 B가 주어진다.</p>
</div>
<div id="problem_output" class="problem-text">
<p>첫째 줄에 A+B를 출력한다.</p>
</div>
<pre id="sample-input-1">1 2</pre>
<pre id="sample-output-1">3</pre>
<pre id="sample-input-2">10 20</pre>
<pre id="sample-output-2">30</pre>
</body>
</html>
